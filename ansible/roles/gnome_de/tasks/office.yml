- name: office utilites
  become: true
  yum:
    state: latest
    name:
      - gedit
      - evince
      - gnome-screenshot
      - libreoffice-writer
      - libreoffice-calc
      - gvim

- name: office vim root
  become: true
  copy:
    src: .vimrc
    dest: /root

- name: office vim 
  copy:
    src: .vimrc
    dest: ~/
