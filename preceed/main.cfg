# d-i	anna/choose_modules	multiselect	choose-mirror, crypto-dm-modules-6.12.63+deb13-amd64-di

# REPO
apt-cdrom-setup	apt-setup/cdrom/set-first	boolean	false
# apt-cdrom-setup	apt-setup/cdrom/set-double	boolean	false
# apt-cdrom-setup	apt-setup/cdrom/set-failed	boolean	false
# apt-cdrom-setup	apt-setup/cdrom/set-next	boolean	false

# apt-mirror-setup	apt-setup/use_mirror	boolean	true
choose-mirror-bin	mirror/country	string			manual
choose-mirror-bin	mirror/protocol				select	http
d-i			mirror/http/hostname			string	deb.debian.org
d-i			mirror/http/directory			string	/debian/
d-i			mirror/http/proxy			string	

apt-setup-udeb		apt-setup/enable-source-repositories	boolean	false
apt-setup-udeb		apt-setup/services-select		multiselect	security, updates

apt-mirror-setup	apt-setup/contrib			boolean	false
apt-mirror-setup	apt-setup/non-free			boolean	false
apt-mirror-setup	apt-setup/non-free-firmware		boolean	true

d-i			popularity-contest/participate		boolean	false
base-installer		base-installer/install-recommends	boolean	false

# LOCALIZATION
d-i			debian-installer/locale			select	en_US.UTF-8
d-i			keyboard-configuration/xkb-keymap	select	us
tzsetup-udeb		time/zone				select	UTC

# NETWORK
# netcfg	netcfg/target_network_config	select	Network Manager
# netcfg	netcfg/enable	boolean	true
# netcfg	netcfg/dhcp_hostname	string	host2	
# netcfg	netcfg/get_hostname	string	debian13manual
# netcfg	netcfg/hostname		string	somehost

# POSTINSTALL
finish-install	finish-install/reboot_in_progress	note	

# SECURITY
user-setup-udeb	passwd/make-user		boolean		false
user-setup-udeb	passwd/root-login		boolean		true
d-i		passwd/root-password		password	yandexyandex
d-i		passwd/root-password-again	password	yandexyandex

# SOFTWARE
d-i     debconf/priority        select		high
tasksel	tasksel/first		multiselect	ssh-server

# BOOTLOADER
grub-installer	grub-installer/only_debian			boolean	true
grub-installer	grub-installer/force-efi-extra-removable	boolean	false

# PARTITIONING
# d-i partman-auto/method string regular
# d-i partman-auto/choose_recipe select atomic
# d-i partman-partitioning/confirm_write_new_label boolean true
# d-i partman/choose_partition select finish
# d-i partman/confirm boolean true
